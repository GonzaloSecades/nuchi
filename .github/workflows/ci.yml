name: ci

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    # The backend's behavioral coverage — one-time token consume, expiry,
    # concurrency and row-lock invariants, RLS ownership, the full auth and
    # email flows — is all live-database tests gated on TEST_DATABASE_URL.
    # Without a postgres service they skip silently and the job stays green
    # while testing almost nothing, so CI runs a real Postgres 17 (matching
    # docker-compose.yml) and applies the migrations before testing.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: nuchi
          POSTGRES_USER: nuchi
          POSTGRES_PASSWORD: nuchi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nuchi -d nuchi"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://nuchi:nuchi@localhost:5432/nuchi?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
      # Pinned to the same version backend/README.md documents for local use.
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@v3.27.2
      - name: Apply migrations
        run: goose -dir migrations postgres "$TEST_DATABASE_URL" up
        working-directory: backend
      # The postgres image creates POSTGRES_USER as a SUPERUSER, and
      # superusers bypass row level security outright — FORCE included. Left
      # alone, every RLS ownership test would pass vacuously against a
      # connection that no policy applies to, which is the opposite of what
      # they exist to prove. Migrations need the superuser rights first
      # (00001 runs CREATE EXTENSION citext), so the attribute is dropped
      # immediately afterwards, leaving the app role as table owner with
      # FORCE RLS applying to it exactly as in a real deployment.
      - name: Drop superuser from the app role so RLS applies
        run: |
          psql "$TEST_DATABASE_URL" -c 'ALTER ROLE nuchi NOSUPERUSER'
          psql "$TEST_DATABASE_URL" -tAc "SELECT rolsuper FROM pg_roles WHERE rolname = current_user" | grep -qx f
      - run: go vet ./...
        working-directory: backend
      - run: go test ./...
        working-directory: backend

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun ./scripts/validate-openapi.ts

  frontend:
    runs-on: ubuntu-latest
    env:
      # Build-safe dummies keep CI green when secrets are absent (fork PRs,
      # fresh setup). Real secrets take precedence when configured; the Clerk
      # dependency disappears with #51/#27.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_Y2xlcmsuZXhhbXBsZS5jb20k' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_ci_placeholder_not_a_real_key' }}
      DATABASE_URL: postgres://nuchi:nuchi@localhost:5432/nuchi?sslmode=disable
      NEXT_PUBLIC_API_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run build
